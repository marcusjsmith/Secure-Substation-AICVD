<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Cisco utility substation SD-WAN reference architecture">
  <defs>
    <style>
      .title{font-size:15px;font-weight:600;fill:#12324a}
      .sub{font-size:12.5px;font-weight:600;fill:#12324a}
      .lbl{font-size:12px;fill:#233b4d}
      .lblc{font-size:12px;fill:#233b4d;text-anchor:middle}
      .small{font-size:10.5px;fill:#3a4a55;text-anchor:middle}
      .zone{font-size:12px;font-weight:600;fill:#1b3a52;text-anchor:middle}
      .legend{font-size:12.5px;fill:#233b4d}
    </style>

    <!-- Router (Cisco cross-arrows) -->
    <symbol id="router" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="27" fill="#1c4e6b" stroke="#0e3145" stroke-width="1.5"/>
      <g stroke="#ffffff" stroke-width="2.6" fill="#ffffff" stroke-linejoin="round" stroke-linecap="round">
        <line x1="13" y1="23" x2="47" y2="23"/><path d="M17 18 L11 23 L17 28 Z"/><path d="M43 18 L49 23 L43 28 Z"/>
        <line x1="13" y1="37" x2="47" y2="37"/><path d="M17 32 L11 37 L17 42 Z"/><path d="M43 32 L49 37 L43 42 Z"/>
      </g>
    </symbol>

    <!-- Server -->
    <symbol id="server" viewBox="0 0 46 56">
      <rect x="8" y="3" width="30" height="50" rx="2.5" fill="#7c8b96" stroke="#3f4d57" stroke-width="1.4"/>
      <rect x="12" y="8" width="22" height="6" rx="1" fill="#d5dde2"/>
      <rect x="12" y="18" width="22" height="6" rx="1" fill="#d5dde2"/>
      <rect x="12" y="28" width="22" height="6" rx="1" fill="#d5dde2"/>
      <circle cx="30" cy="45" r="2.4" fill="#57c85a"/><circle cx="22" cy="45" r="2.4" fill="#f0b429"/>
    </symbol>

    <!-- Switch -->
    <symbol id="switch" viewBox="0 0 74 34">
      <rect x="2" y="2" width="70" height="30" rx="4" fill="#0f7d8e" stroke="#0a5a67" stroke-width="1.2"/>
      <g stroke="#eafcff" stroke-width="2.2" fill="#eafcff" stroke-linecap="round" stroke-linejoin="round">
        <line x1="16" y1="12" x2="58" y2="12"/><path d="M22 8 L14 12 L22 16 Z"/><path d="M52 8 L60 12 L52 16 Z"/>
        <line x1="16" y1="22" x2="58" y2="22"/><path d="M52 18 L60 22 L52 26 Z"/><path d="M22 18 L14 22 L22 26 Z"/>
      </g>
    </symbol>

    <!-- Firewall (brick) -->
    <symbol id="firewall" viewBox="0 0 60 42">
      <rect x="1" y="1" width="58" height="40" rx="3" fill="#b23b3b" stroke="#7d2626" stroke-width="1.2"/>
      <g stroke="#f4d9d9" stroke-width="1.6">
        <line x1="1" y1="14" x2="59" y2="14"/><line x1="1" y1="27" x2="59" y2="27"/>
        <line x1="20" y1="1" x2="20" y2="14"/><line x1="40" y1="1" x2="40" y2="14"/>
        <line x1="10" y1="14" x2="10" y2="27"/><line x1="30" y1="14" x2="30" y2="27"/><line x1="50" y1="14" x2="50" y2="27"/>
        <line x1="20" y1="27" x2="20" y2="41"/><line x1="40" y1="27" x2="40" y2="41"/>
      </g>
    </symbol>

    <!-- IED -->
    <symbol id="ied" viewBox="0 0 40 40">
      <rect x="5" y="6" width="30" height="24" rx="2" fill="#1c6fb5" stroke="#0f4a7c" stroke-width="1.3"/>
      <g fill="#cfe6fb"><rect x="9" y="10" width="7" height="7"/><rect x="18" y="10" width="7" height="7"/><rect x="27" y="10" width="4" height="7"/><rect x="9" y="20" width="22" height="5"/></g>
      <g stroke="#0f4a7c" stroke-width="1.6"><line x1="12" y1="30" x2="12" y2="35"/><line x1="20" y1="30" x2="20" y2="35"/><line x1="28" y1="30" x2="28" y2="35"/></g>
    </symbol>

    <!-- Laptop -->
    <symbol id="laptop" viewBox="0 0 48 36">
      <rect x="9" y="4" width="30" height="20" rx="2" fill="#324a5c" stroke="#1d2e3b" stroke-width="1.2"/>
      <rect x="12" y="7" width="24" height="14" fill="#8fb8d6"/>
      <path d="M4 30 L44 30 L48 34 L0 34 Z" fill="#4a5f70" stroke="#1d2e3b" stroke-width="1"/>
    </symbol>

    <!-- IP phone -->
    <symbol id="phone" viewBox="0 0 40 40">
      <rect x="9" y="3" width="22" height="28" rx="3" fill="#324a5c" stroke="#1d2e3b" stroke-width="1.2"/>
      <rect x="12" y="7" width="16" height="10" rx="1" fill="#8fb8d6"/>
      <g fill="#8aa1b3"><circle cx="15" cy="21" r="1.8"/><circle cx="20" cy="21" r="1.8"/><circle cx="25" cy="21" r="1.8"/><circle cx="15" cy="26" r="1.8"/><circle cx="20" cy="26" r="1.8"/><circle cx="25" cy="26" r="1.8"/></g>
      <path d="M4 31 Q4 37 10 37 L30 37 Q36 37 36 31" fill="none" stroke="#324a5c" stroke-width="3"/>
    </symbol>

    <!-- Wireless AP -->
    <symbol id="ap" viewBox="0 0 46 40">
      <rect x="10" y="24" width="26" height="12" rx="3" fill="#3b566b" stroke="#22333f" stroke-width="1.2"/>
      <circle cx="23" cy="30" r="2.2" fill="#7ed957"/>
      <g fill="none" stroke="#1c6fb5" stroke-width="2.4" stroke-linecap="round">
        <path d="M15 18 Q23 10 31 18"/><path d="M11 13 Q23 1 35 13"/>
      </g>
    </symbol>

    <!-- CCTV camera (bullet) -->
    <symbol id="cctv" viewBox="0 0 50 40">
      <rect x="30" y="6" width="6" height="10" rx="2" fill="#3b566b"/>
      <rect x="22" y="3" width="20" height="5" rx="2.5" fill="#3b566b"/>
      <rect x="7" y="15" width="30" height="15" rx="6" fill="#556b7d" stroke="#22333f" stroke-width="1.3"/>
      <rect x="3" y="17" width="9" height="11" rx="3.5" fill="#3b4f5e" stroke="#22333f" stroke-width="1.1"/>
      <circle cx="7" cy="22" r="3.3" fill="#22333f"/>
      <circle cx="7" cy="22" r="1.4" fill="#9fc4e0"/>
      <circle cx="31" cy="21" r="1.7" fill="#7ed957"/>
    </symbol>

    <!-- Cyber Vision (eye) -->
    <symbol id="eye" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="27" fill="#0b2f4a" stroke="#08243a" stroke-width="1.5"/>
      <path d="M12 30 Q30 14 48 30 Q30 46 12 30 Z" fill="#0e3f63"/>
      <circle cx="30" cy="30" r="8" fill="#37c5f0"/><circle cx="30" cy="30" r="3.4" fill="#0b2f4a"/>
      <g fill="#37c5f0"><circle cx="14" cy="20" r="2"/><circle cx="46" cy="20" r="2"/><circle cx="14" cy="40" r="2"/><circle cx="46" cy="40" r="2"/><circle cx="30" cy="12" r="2"/><circle cx="30" cy="48" r="2"/></g>
    </symbol>

    <!-- ISE (fingerprint) -->
    <symbol id="ise" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="27" fill="#00b4e6" stroke="#008fbb" stroke-width="1.5"/>
      <g fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round">
        <path d="M18 34 Q18 18 30 18 Q42 18 42 34"/>
        <path d="M23 36 Q23 23 30 23 Q37 23 37 36"/>
        <path d="M28 38 Q28 28 30 28 Q32 28 32 38"/>
        <line x1="30" y1="32" x2="30" y2="40"/>
      </g>
    </symbol>

    <!-- Management monitor -->
    <symbol id="monitor" viewBox="0 0 56 48">
      <rect x="4" y="3" width="48" height="32" rx="2.5" fill="#2b3f4e" stroke="#182631" stroke-width="1.4"/>
      <rect x="8" y="7" width="40" height="24" fill="#8fb8d6"/>
      <rect x="23" y="35" width="10" height="6" fill="#2b3f4e"/><rect x="16" y="41" width="24" height="4" rx="2" fill="#2b3f4e"/>
    </symbol>

    <!-- Legacy RTU -->
    <symbol id="rtu" viewBox="0 0 60 40">
      <rect x="2" y="2" width="56" height="36" rx="4" fill="#151515" stroke="#000" stroke-width="1.2"/>
      <text x="30" y="18" text-anchor="middle" font-size="12" font-weight="700" fill="#f2f2f2">Legacy</text>
      <text x="30" y="31" text-anchor="middle" font-size="12" font-weight="700" fill="#f2f2f2">RTU</text>
    </symbol>

    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#5a6b78"/></marker>
  </defs>

  <!-- ===================== CLOUDS ===================== -->
  <!-- Corporate network cloud -->
  <g>
    <path d="M360 150 Q340 118 380 116 Q392 92 430 104 Q452 82 500 96 Q540 80 576 100 Q620 86 648 108 Q700 92 720 118 Q772 112 772 142 Q800 150 776 172 Q760 190 720 182 Q690 200 640 188 Q600 202 560 188 Q520 200 480 188 Q440 198 410 184 Q372 190 362 168 Q340 168 360 150 Z" fill="#8fbfe6" stroke="#5f95c4" stroke-width="1.4" opacity="0.95"/>
    <text x="565" y="152" class="title" text-anchor="middle" font-size="17">Corporate network</text>
  </g>

  <!-- WAN cloud -->
  <g>
    <path d="M70 350 Q40 316 90 312 Q110 292 160 306 Q230 288 290 306 Q400 288 470 306 Q640 290 700 310 Q900 292 980 312 Q1120 300 1180 320 Q1270 314 1290 344 Q1330 348 1300 378 Q1290 402 1220 392 Q1120 410 1010 396 Q860 410 700 396 Q520 412 380 396 Q220 410 140 392 Q70 400 70 366 Q40 366 70 350 Z" fill="#c9ced1" stroke="#9aa1a6" stroke-width="1.4" opacity="0.96"/>
    <text x="640" y="356" class="title" text-anchor="middle" font-size="18">WAN</text>
  </g>

  <!-- ===================== SUBSTATION OUTER BOXES ===================== -->
  <rect x="30" y="362" width="528" height="322" rx="18" fill="#b6d4ec" stroke="#7ea9cf" stroke-width="1.6"/>
  <rect x="838" y="362" width="528" height="322" rx="18" fill="#b6d4ec" stroke="#7ea9cf" stroke-width="1.6"/>

  <!-- ===================== HUB UPLINKS ===================== -->
  <g stroke="#5a6b78" stroke-width="1.6" fill="none" opacity="0.85">
    <line x1="378" y1="286" x2="300" y2="252"/>
    <line x1="882" y1="286" x2="958" y2="252"/>
    <line x1="625" y1="264" x2="625" y2="320"/>
    <line x1="500" y1="192" x2="565" y2="180"/>
    <line x1="740" y1="192" x2="620" y2="180"/>
    <line x1="300" y1="188" x2="380" y2="160"/>
    <line x1="958" y1="188" x2="760" y2="160"/>
  </g>

  <!-- ===================== TOP TIER ===================== -->
  <!-- Enterprise Applications Center -->
  <text x="500" y="24" class="title" text-anchor="middle">Enterprise Applications Center</text>
  <rect x="378" y="32" width="244" height="72" rx="10" fill="#f4f8fc" stroke="#5f95c4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <use href="#server" x="440" y="42" width="42" height="52"/>
  <use href="#server" x="520" y="42" width="42" height="52"/>

  <!-- Security Operations & Management Center -->
  <text x="945" y="24" class="title" text-anchor="middle">Security Operations &amp; Management Center</text>
  <rect x="732" y="32" width="426" height="72" rx="10" fill="#f4f8fc" stroke="#5f95c4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <use href="#eye" x="792" y="42" width="46" height="46"/>
  <text x="815" y="100" class="small">Cyber Vision</text>
  <use href="#ise" x="912" y="42" width="46" height="46"/>
  <text x="935" y="100" class="small">ISE</text>
  <use href="#monitor" x="1024" y="46" width="52" height="44"/>
  <text x="1050" y="100" class="small">Management Station</text>

  <!-- ===================== AGGREGATION TIER ===================== -->
  <!-- Data Center 1 -->
  <rect x="186" y="184" width="224" height="80" rx="12" fill="#eef4f9" stroke="#7ea9cf" stroke-width="1.5"/>
  <text x="198" y="202" class="sub">Data Center 1</text>
  <use href="#server" x="278" y="200" width="40" height="50"/>
  <text x="298" y="258" class="small">SCADA</text>

  <!-- Cisco SD-WAN Controllers -->
  <rect x="482" y="186" width="286" height="78" rx="12" fill="#eef4f9" stroke="#7ea9cf" stroke-width="1.5"/>
  <text x="625" y="202" class="title" text-anchor="middle">Cisco SD-WAN Controllers</text>
  <text x="537" y="222" class="small">Manager</text>
  <use href="#router" x="518" y="226" width="38" height="38"/>
  <text x="625" y="222" class="small">Controller</text>
  <use href="#router" x="606" y="226" width="38" height="38"/>
  <text x="713" y="222" class="small">Validator</text>
  <use href="#router" x="694" y="226" width="38" height="38"/>

  <!-- Data Center 2 -->
  <rect x="844" y="184" width="224" height="80" rx="12" fill="#eef4f9" stroke="#7ea9cf" stroke-width="1.5"/>
  <text x="856" y="202" class="sub">Data Center 2</text>
  <use href="#server" x="936" y="200" width="40" height="50"/>
  <text x="956" y="258" class="small">SCADA</text>

  <!-- Hub routers -->
  <use href="#router" x="358" y="278" width="42" height="42"/>
  <text x="348" y="292" class="lbl" text-anchor="end">DC1 Hub Router</text>
  <use href="#router" x="860" y="278" width="42" height="42"/>
  <text x="912" y="292" class="lbl">DC2 Hub Router</text>

  <!-- ===================== MEDIUM SUBSTATION ===================== -->
  <text x="52" y="392" class="title">Medium Substation Router</text>
  <text x="52" y="412" class="title">and NextGen Firewall</text>
  <use href="#router" x="286" y="368" width="44" height="44"/>

  <!-- Multi Service Zone (medium) -->
  <rect x="46" y="470" width="196" height="196" rx="12" fill="#cfe3f4" stroke="#8bb2d6" stroke-width="1.3"/>
  <text x="144" y="490" class="zone">Multi Service Zone</text>
  <line x1="308" y1="390" x2="180" y2="526" stroke="#1c6fb5" stroke-width="2" stroke-linecap="round"/>
  <g stroke="#1c6fb5" stroke-width="1.6" stroke-linecap="round">
    <line x1="92" y1="538" x2="150" y2="526"/>
    <line x1="87" y1="548" x2="75" y2="592"/>
    <line x1="87" y1="548" x2="129" y2="592"/>
    <line x1="180" y1="540" x2="162" y2="606"/>
    <line x1="180" y1="540" x2="206" y2="604"/>
  </g>
  <use href="#ap" x="66" y="516" width="42" height="36"/>
  <use href="#switch" x="150" y="512" width="60" height="28"/>
  <use href="#laptop" x="54" y="592" width="42" height="32"/>
  <use href="#laptop" x="108" y="592" width="42" height="32"/>
  <use href="#phone" x="146" y="606" width="32" height="36"/>
  <text x="162" y="655" class="small">IP Telephony</text>
  <use href="#cctv" x="184" y="604" width="44" height="36"/>
  <text x="210" y="665" class="small">CCTV</text>

  <!-- ESP Zone (medium) -->
  <rect x="312" y="446" width="230" height="224" rx="10" fill="#e7eaec" stroke="#a9b2b8" stroke-width="1.3"/>
  <!-- internal links (medium) - drawn above the zone box so they connect to the icons -->
  <g fill="none" stroke-linecap="round">
    <line x1="308" y1="390" x2="356" y2="487" stroke="#e08a2b" stroke-width="3"/>
    <line x1="308" y1="390" x2="430" y2="466" stroke="#3ba05a" stroke-width="3"/>
    <line x1="465" y1="515" x2="430" y2="466" stroke="#1c6fb5" stroke-width="2.2"/>
    <line x1="465" y1="515" x2="440" y2="580" stroke="#1c6fb5" stroke-width="2"/>
    <line x1="465" y1="515" x2="492" y2="580" stroke="#1c6fb5" stroke-width="2"/>
  </g>
  <use href="#rtu" x="330" y="470" width="52" height="34"/>
