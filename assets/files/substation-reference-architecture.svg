  <use href="#firewall" x="404" y="448" width="52" height="36"/>
  <text x="470" y="462" class="lbl" font-size="11">ESP Firewall</text>
  <use href="#switch" x="432" y="500" width="66" height="30"/>
  <text x="465" y="494" class="small">Switch +</text>
  <text x="465" y="546" class="small">CV Sensor</text>
  <use href="#ied" x="420" y="560" width="40" height="40"/>
  <text x="440" y="614" class="small">IED</text>
  <use href="#ied" x="472" y="560" width="40" height="40"/>
  <text x="492" y="614" class="small">IED</text>
  <text x="427" y="644" class="zone" font-size="11">Electronic Security</text>
  <text x="427" y="659" class="zone" font-size="11">Perimeter Zone</text>

  <!-- ===================== SMALL SUBSTATION ===================== -->
  <text x="1348" y="392" class="title" text-anchor="end">Small Substation Router</text>
  <text x="1348" y="412" class="title" text-anchor="end">and Integrated Firewall</text>
  <use href="#router" x="1096" y="368" width="44" height="44"/>

  <!-- Multi Service Zone (small) -->
  <rect x="854" y="470" width="196" height="196" rx="12" fill="#cfe3f4" stroke="#8bb2d6" stroke-width="1.3"/>
  <text x="952" y="490" class="zone">Multi Service Zone</text>
  <line x1="1118" y1="390" x2="988" y2="526" stroke="#1c6fb5" stroke-width="2" stroke-linecap="round"/>
  <g stroke="#1c6fb5" stroke-width="1.6" stroke-linecap="round">
    <line x1="900" y1="538" x2="958" y2="526"/>
    <line x1="895" y1="548" x2="883" y2="592"/>
    <line x1="895" y1="548" x2="931" y2="592"/>
    <line x1="988" y1="540" x2="970" y2="606"/>
    <line x1="988" y1="540" x2="1014" y2="604"/>
  </g>
  <use href="#ap" x="874" y="516" width="42" height="36"/>
  <use href="#switch" x="958" y="512" width="60" height="28"/>
  <use href="#laptop" x="862" y="592" width="42" height="32"/>
  <use href="#laptop" x="910" y="592" width="42" height="32"/>
  <use href="#phone" x="954" y="606" width="32" height="36"/>
  <text x="970" y="655" class="small">IP Telephony</text>
  <use href="#cctv" x="992" y="604" width="44" height="36"/>
  <text x="1018" y="665" class="small">CCTV</text>

  <!-- ESP Zone (small) -->
  <rect x="1120" y="446" width="230" height="224" rx="10" fill="#e7eaec" stroke="#a9b2b8" stroke-width="1.3"/>
  <!-- internal links (small) - drawn above the zone box so they connect to the icons -->
  <g fill="none" stroke-linecap="round">
    <line x1="1118" y1="390" x2="1164" y2="487" stroke="#e08a2b" stroke-width="3"/>
    <line x1="1118" y1="390" x2="1273" y2="515" stroke="#1c6fb5" stroke-width="2"/>
    <line x1="1273" y1="515" x2="1248" y2="580" stroke="#1c6fb5" stroke-width="2"/>
    <line x1="1273" y1="515" x2="1300" y2="580" stroke="#1c6fb5" stroke-width="2"/>
  </g>
  <use href="#rtu" x="1138" y="470" width="52" height="34"/>
  <text x="1164" y="518" class="small">Serial RS232</text>
  <use href="#switch" x="1240" y="500" width="66" height="30"/>
  <text x="1273" y="494" class="small">Switch +</text>
  <text x="1273" y="546" class="small">CV Sensor</text>
  <use href="#ied" x="1228" y="560" width="40" height="40"/>
  <text x="1248" y="614" class="small">IED</text>
  <use href="#ied" x="1280" y="560" width="40" height="40"/>
  <text x="1300" y="614" class="small">IED</text>
  <text x="1235" y="644" class="zone" font-size="11">Electronic Security</text>
  <text x="1235" y="659" class="zone" font-size="11">Perimeter Zone</text>

  <!-- diagram id -->

  <!-- ===================== IPSEC TUNNELS (top layer, above all boxes) ===================== -->
  <!-- Primary (cyan): DC1 hub -> both substations -->
  <g stroke="#00bce7" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M379 299 L308 390"/>
    <path d="M379 299 L1118 390"/>
  </g>
  <!-- Secondary (lavender): DC2 hub -> both substations -->
  <g stroke="#9fb0e0" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M881 299 L308 390"/>
    <path d="M881 299 L1118 390"/>
  </g>
  <!-- router caps: redraw over tunnel ends so lines terminate cleanly under the routers -->
  <use href="#router" x="358" y="278" width="42" height="42"/>
  <use href="#router" x="860" y="278" width="42" height="42"/>
  <use href="#router" x="286" y="368" width="44" height="44"/>
  <use href="#router" x="1096" y="368" width="44" height="44"/>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="712" width="1336" height="52" rx="10" fill="#ffffff" stroke="#7d5fb5" stroke-width="1.4" stroke-dasharray="7 4"/>
  <text x="640" y="722" class="sub" text-anchor="middle" font-size="12">Legend</text>
  <line x1="150" y1="742" x2="240" y2="742" stroke="#00bce7" stroke-width="5" stroke-linecap="round"/>
  <text x="256" y="746" class="legend">IPSec Tunnel to Primary DC</text>
  <line x1="640" y1="742" x2="730" y2="742" stroke="#9fb0e0" stroke-width="5" stroke-linecap="round"/>
  <text x="746" y="746" class="legend">IPSec Tunnel to Secondary DC</text>
</svg>
